<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Client Reviews - IT Consultancy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <a href="index.html" class="btn btn-secondary mb-4"><i class="fas fa-arrow-left"></i> Back to Home</a>
    <h2 class="fw-bold mb-5 text-center">All Client Reviews</h2>

    <div class="row g-4" id="allReviewsContainer">
        <p class="text-center text-muted">Loading all approved reviews from database...</p>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Ikkada localhost theesesi, direct ga relative path icham
        fetch('/api/reviews/approved')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('allReviewsContainer');
                container.innerHTML = ''; // "Loading..." text ni theeseyadaniki

                if(data.length === 0) {
                    container.innerHTML = '<p class="text-center text-muted">There are no reviews. Be the first to review!</p>';
                    return;
                }

                // Vachina prathi review ni oka manchi Card design lo chupinchadam
                data.forEach(review => {
                    const card = `
                        <div class="col-md-4">
                            <div class="card h-100 shadow-sm" style="border-radius: 15px; border-left: 5px solid #198754;">
                                <div class="card-body">
                                    <div class="mb-3 text-warning">
                                        <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                                    </div>
                                    <p class="card-text text-muted fst-italic">"${review.clientMessage}"</p>
                                    <h5 class="fw-bold mb-0">${review.clientName}</h5>
                                    <small class="text-success fw-bold">${review.clientRole}</small>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('allReviewsContainer').innerHTML = '<p class="text-center text-danger">Reviews are not loading. Please check backend connection.</p>';
            });
    });
</script>


</body>
</html>
